<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sampark AI — Candidate Screening</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #f4501e; --navy: #0d1b2a;
      --text: #1a1a2e; --muted: #6b7280; --border: #e5e7eb;
      --bg: #f9fafb; --card: #ffffff; --green: #22c55e;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    header {
      flex-shrink: 0; padding: 0 1.5rem; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      background: var(--navy); border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .h-logo { display: flex; align-items: center; gap: .6rem; }
    .logo-sq { width: 28px; height: 28px; background: var(--orange); border-radius: 6px; flex-shrink: 0; }
    .h-logo span { font-weight: 800; color: #fff; font-size: .95rem; }
    .h-job { font-size: .78rem; color: rgba(255,255,255,.5); }
    .h-job strong { color: rgba(255,255,255,.85); }

    .prog-wrap { flex-shrink: 0; padding: .6rem 1.5rem .3rem; background: #fff; border-bottom: 1px solid var(--border); }
    .prog-bar { height: 4px; background: var(--border); border-radius: 999px; overflow: hidden; }
    .prog-fill { height: 100%; background: linear-gradient(90deg, var(--orange), #ff8c42); border-radius: 999px; transition: width .5s ease; width: 0%; }
    .prog-label { font-size: .7rem; color: var(--muted); text-align: right; margin-top: .25rem; font-weight: 500; }

    .chat-area { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; max-width: 700px; width: 100%; margin: 0 auto; }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg { display: flex; gap: .75rem; max-width: 85%; }
    .msg.bot { align-self: flex-start; }
    .msg.usr { align-self: flex-end; flex-direction: row-reverse; }
    .av { width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: .9rem; }
    .bot .av { background: rgba(244,80,30,.1); border: 1.5px solid rgba(244,80,30,.2); }
    .usr .av { background: rgba(13,27,42,.08); border: 1.5px solid rgba(13,27,42,.12); }
    .bubble { padding: .75rem 1rem; border-radius: 14px; font-size: .9rem; line-height: 1.6; }
    .bot .bubble { background: var(--card); border: 1.5px solid var(--border); border-top-left-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,.04); }
    .usr .bubble { background: var(--navy); color: #fff; border-top-right-radius: 4px; }

    .typing { display: flex; gap: .3rem; padding: .75rem 1rem; background: var(--card); border: 1.5px solid var(--border); border-radius: 14px; border-top-left-radius: 4px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--orange); animation: bop .85s ease-in-out infinite; opacity: .5; }
    .dot:nth-child(2){animation-delay:.15s;} .dot:nth-child(3){animation-delay:.3s;}
    @keyframes bop { 0%,80%,100%{transform:scale(.65);opacity:.35} 40%{transform:scale(1);opacity:1} }

    .input-row {
      flex-shrink: 0; padding: 1rem 1.5rem 1.5rem;
      display: flex; gap: .75rem; max-width: 700px; width: 100%; margin: 0 auto;
      background: var(--bg);
    }
    #uinput {
      flex: 1; padding: .75rem 1rem; background: var(--card); border: 1.5px solid var(--border);
      border-radius: 12px; color: var(--text); font-size: .9rem; font-family: inherit;
      resize: none; min-height: 46px; max-height: 120px; line-height: 1.5; transition: border-color .2s;
    }
    #uinput:focus { outline: none; border-color: var(--orange); }
    #uinput:disabled { opacity: .45; background: var(--bg); }
    #sendbtn {
      width: 46px; height: 46px; border-radius: 12px; border: none;
      background: var(--orange); color: #fff; font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: background .2s, transform .15s;
    }
    #sendbtn:hover:not(:disabled) { background: #d93d0d; transform: scale(1.05); }
    #sendbtn:disabled { opacity: .4; cursor: not-allowed; }

    .done-card {
      text-align: center; padding: 2.5rem 2rem; background: var(--card);
      border: 1.5px solid rgba(34,197,94,.25); border-radius: 18px;
      box-shadow: 0 8px 32px rgba(34,197,94,.06);
    }
    .done-card .d-icon { font-size: 3rem; margin-bottom: 1rem; }
    .done-card h3 { font-size: 1.2rem; font-weight: 800; color: var(--navy); margin-bottom: .6rem; }
    .done-card p { font-size: .875rem; color: var(--muted); line-height: 1.7; }
    .done-score { display: inline-block; margin-top: .75rem; padding: .4rem 1.25rem; background: rgba(34,197,94,.1); border-radius: 999px; color: #16a34a; font-weight: 800; font-size: 1rem; }
  </style>
</head>
<body>

<header>
  <div class="h-logo"><div class="logo-sq"></div><span>Sampark AI</span></div>
  <div class="h-job">Screening for: <strong id="h-title">Loading...</strong></div>
</header>

<div class="prog-wrap">
  <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
  <div class="prog-label" id="prog-label">Question 0 of 10</div>
</div>

<div class="chat-area" id="chat"></div>

<div class="input-row">
  <textarea id="uinput" placeholder="Type your answer here..." onkeydown="onKey(event)" oninput="autoH(this)"></textarea>
  <button id="sendbtn" onclick="send()">➤</button>
</div>

<script>
const SB_URL = 'https://sebghpbyykplkoootzdg.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNlYmdocGJ5eWtwbGtvb290emRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5OTE1NjksImV4cCI6MjA5NTU2NzU2OX0.dzPJWMdxL5HhmTKcPYV2669hJTZcwDkNDFfCetQjWmQ';

const params    = new URLSearchParams(window.location.search);
const JOB_KEY   = params.get('job')    || 'demo';
const JOB_TITLE = decodeURIComponent(params.get('title') || 'Open Position');
const CLIENT_ID = parseInt(params.get('client') || '1');

document.getElementById('h-title').textContent = JOB_TITLE;
document.title = `Sampark AI — ${JOB_TITLE}`;

const QS = [
  { key:'name',          q:`Hi! I'm Sampark, your AI screening assistant 👋\n\nI'll ask you 10 quick questions for the **${JOB_TITLE}** role — takes about 3 minutes.\n\nLet's start — what's your full name?` },
  { key:'phone',         q:"Great! What's your phone number? (We'll use this to schedule if you're shortlisted)" },
  { key:'email',         q:"And your email address?" },
  { key:'experience',    q:"How many years of relevant work experience do you have?" },
  { key:'skills',        q:"What are your key skills relevant to this role?" },
  { key:'current_ctc',   q:"What is your current CTC (annual package)?" },
  { key:'expected_ctc',  q:"What is your expected CTC for this role?" },
  { key:'notice_period', q:"What is your notice period / when can you join?" },
  { key:'location',      q:"What is your current location, and are you open to relocation if needed?" },
  { key:'why_apply',     q:"Last question — why are you interested in this role? 🙂" },
];

let qIdx=0, answers={}, busy=false, done=false;

window.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => botMsg(QS[0].q), 700);
  updateProg();
});

async function sbSave(data) {
  const r = await fetch(`${SB_URL}/rest/v1/candidates`, {
    method: 'POST',
    headers: { 'apikey':SB_KEY, 'Authorization':`Bearer ${SB_KEY}`, 'Content-Type':'application/json', 'Prefer':'return=minimal' },
    body: JSON.stringify(data)
  });
  if (!r.ok) { const t=await r.text(); throw new Error(t); }
}

function botMsg(text) {
  const area=document.getElementById('chat');
  const div=document.createElement('div'); div.className='msg bot';
  const html=text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  div.innerHTML=`<div class="av">🤖</div><div class="bubble">${html}</div>`;
  area.appendChild(div); area.scrollTop=area.scrollHeight;
}
function usrMsg(text) {
  const area=document.getElementById('chat');
  const div=document.createElement('div'); div.className='msg usr';
  div.innerHTML=`<div class="av">👤</div><div class="bubble">${text}</div>`;
  area.appendChild(div); area.scrollTop=area.scrollHeight;
}
function showTyping() {
  const area=document.getElementById('chat');
  const t=document.createElement('div'); t.className='msg bot'; t.id='typing';
  t.innerHTML=`<div class="av">🤖</div><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  area.appendChild(t); area.scrollTop=area.scrollHeight;
}
function hideTyping(){const t=document.getElementById('typing');if(t)t.remove();}
function updateProg() {
  const pct=(qIdx/QS.length)*100;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-label').textContent=`Question ${qIdx} of ${QS.length}`;
}
function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}
function autoH(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

async function send() {
  if (busy||done) return;
  const inp=document.getElementById('uinput');
  const text=inp.value.trim(); if(!text) return;
  inp.value=''; inp.style.height='';
  usrMsg(text);
  answers[QS[qIdx].key]=text;
  qIdx++; updateProg();

  if (qIdx>=QS.length) {
    done=true; inp.disabled=true; document.getElementById('sendbtn').disabled=true;
    showTyping(); await sleep(1400); hideTyping();
    await finish(); return;
  }
  busy=true; document.getElementById('sendbtn').disabled=true;
  showTyping(); await sleep(700+Math.random()*400); hideTyping();
  botMsg(QS[qIdx].q);
  busy=false; document.getElementById('sendbtn').disabled=false;
  document.getElementById('uinput').focus();
}

async function finish() {
  const score  = calcScore(answers);
  const summary= buildSummary(answers,score,JOB_TITLE);

  const area=document.getElementById('chat');
  const card=document.createElement('div'); card.className='done-card';
  card.innerHTML=`
    <div class="d-icon">🎉</div>
    <h3>Thank you, ${answers.name||'Candidate'}!</h3>
    <p>Your screening is complete. Our team will review your responses and reach out shortly.</p>
    <div class="done-score">Your AI Score: ${score} / 10</div>`;
  area.appendChild(card); area.scrollTop=area.scrollHeight;

  const record = {
    name: answers.name||'', phone: answers.phone||'', email: answers.email||'',
    experience: answers.experience||'', skills: answers.skills||'',
    score: score, summary: summary, status: 'pending',
    job_id: JOB_KEY, client_id: CLIENT_ID,
    created_at: new Date().toISOString(),
  };

  try {
    await sbSave(record);
    console.log('✅ Saved to Supabase');
  } catch(e) {
    console.warn('⚠️ Supabase save failed:', e.message);
    try {
      const stored=JSON.parse(localStorage.getItem('sampark_q')||'[]');
      stored.push(record); localStorage.setItem('sampark_q',JSON.stringify(stored));
    } catch(_){}
  }
}

function calcScore(a) {
  let s=5.0;
  const expN=parseInt((a.experience||'').match(/(\d+)/)?.[1]||'0');
  if(expN>=6)s+=1.5; else if(expN>=4)s+=1.0; else if(expN>=2)s+=0.5; else s-=0.3;
  const np=(a.notice_period||'').toLowerCase();
  if(np.includes('immediate')||np==='0')s+=1.0;
  else if(np.includes('15')||np.includes('2 week'))s+=0.7;
  else if(np.includes('30')||np.includes('1 month'))s+=0.4;
  else if(np.includes('60')||np.includes('90'))s-=0.4;
  const sc=(a.skills||'').split(/[,\n]+/).filter(x=>x.trim()).length;
  if(sc>=6)s+=0.8; else if(sc>=3)s+=0.4;
  if((a.why_apply||'').length>80)s+=0.5; else if((a.why_apply||'').length>30)s+=0.2;
  return Math.min(10,Math.max(1,parseFloat(s.toFixed(1))));
}
function buildSummary(a,score,title) {
  const tone=score>=8?'Strong candidate.':score>=6?'Good candidate.':'Below threshold.';
  return `${tone} ${a.name||'Candidate'} has ${a.experience||'—'} experience with skills in ${a.skills||'—'}. Notice period: ${a.notice_period||'—'}. Expected CTC: ${a.expected_ctc||'—'}. Applied for ${title}. AI Score: ${score}/10.`;
}
</script>
</body>
</html>
