<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sampark AI — Candidate Screening</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--primary:#FF6B35;--primary-light:#FFF0EB;--green:#10B981;--blue:#3B82F6;--bg:#F8F9FC;--surface:#fff;--border:#E5E7EB;--text:#111827;--muted:#6B7280;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}

.wrapper{width:100%;max-width:440px;}
.powered{text-align:center;font-size:11px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:5px;}
.powered span{font-weight:700;color:var(--primary);}

.widget{background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,0.1);border:1px solid var(--border);}

.w-header{padding:16px 18px;background:linear-gradient(135deg,var(--primary),#FF8C5A);display:flex;align-items:center;gap:12px;}
.w-avatar{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.w-title{color:#fff;font-size:14px;font-weight:700;}
.w-sub{color:rgba(255,255,255,0.8);font-size:11px;margin-top:1px;}
.w-online{width:8px;height:8px;background:#10B981;border-radius:50%;margin-left:auto;box-shadow:0 0 0 3px rgba(16,185,129,0.3);}

.w-progress{background:rgba(255,255,255,0.2);height:3px;position:relative;}
.w-progress-fill{height:100%;background:rgba(255,255,255,0.8);transition:width 0.5s ease;border-radius:0 3px 3px 0;}

.w-body{height:360px;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth;}
.w-body::-webkit-scrollbar{width:3px;}
.w-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

.msg{max-width:88%;animation:fadeUp 0.25s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.msg.bot{align-self:flex-start;}
.msg.user{align-self:flex-end;}
.bubble{padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.5;}
.bot .bubble{background:var(--bg);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:4px;}
.user .bubble{background:linear-gradient(135deg,var(--primary),#FF8C5A);color:#fff;border-bottom-right-radius:4px;}
.msg-time{font-size:10px;color:var(--muted);margin-top:3px;}
.bot .msg-time{text-align:left;}
.user .msg-time{text-align:right;}

.typing{display:flex;gap:4px;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:16px;border-bottom-left-radius:4px;width:fit-content;}
.td{width:6px;height:6px;background:var(--muted);border-radius:50%;animation:bounce 1.2s infinite;}
.td:nth-child(2){animation-delay:0.2s;}
.td:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-5px);}}

.w-options{padding:10px 14px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:6px;min-height:0;}
.opt{padding:6px 14px;border:1.5px solid var(--primary);border-radius:20px;background:var(--primary-light);color:var(--primary);font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s;}
.opt:hover{background:var(--primary);color:#fff;}

.w-input{display:flex;align-items:center;gap:8px;padding:12px 14px;border-top:1px solid var(--border);}
.w-input input{flex:1;padding:9px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;font-family:'Inter',sans-serif;font-size:13px;outline:none;color:var(--text);transition:border-color 0.2s;}
.w-input input:focus{border-color:var(--primary);background:#fff;}
.send{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--primary),#FF8C5A);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:opacity 0.2s;box-shadow:0 2px 8px rgba(255,107,53,0.3);}
.send:hover{opacity:0.9;}

.w-success{background:linear-gradient(135deg,#ECFDF5,#D1FAE5);border-top:1px solid rgba(16,185,129,0.2);padding:16px 18px;display:none;text-align:center;}
.w-success h3{font-size:15px;font-weight:700;color:var(--green);margin-bottom:4px;}
.w-success p{font-size:12px;color:#065F46;}
</style>
</head>
<body>

<div class="wrapper">
  <div class="powered">Powered by <span>Sampark AI</span> · AI Candidate Screening</div>
  <div class="widget">
    <div class="w-header">
      <div class="w-avatar">🤖</div>
      <div>
        <div class="w-title" id="widgetTitle">AI Screener</div>
        <div class="w-sub" id="widgetSub">Let's get you screened quickly</div>
      </div>
      <div class="w-online"></div>
    </div>
    <div class="w-progress"><div class="w-progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="w-success" id="successBanner">
      <h3>Application Submitted! 🎉</h3>
      <p>Our team will review your profile and respond within 2 hours.</p>
    </div>
    <div class="w-body" id="chatBody"></div>
    <div class="w-options" id="chatOptions"></div>
    <div class="w-input">
      <input id="chatInput" placeholder="Type your answer…" onkeydown="handleKey(event)"/>
      <button class="send" onclick="sendMsg()">➤</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://sebghpbyykplkoootzdg.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNlYmdocGJ5eWtwbGtvb290emRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQwMTM5NzUsImV4cCI6MjA1OTU4OTk3NX0.oBMsGVOHnKdz7n8i7kQKBHQ4o7n_8FzNQpTG5Hc_-mA';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

// Read URL params
const params=new URLSearchParams(window.location.search);
const JOB_ID=params.get('job')||null;
const CLIENT_NAME=params.get('client')||window.SAMPARK_CLIENT||'TechCorp India';
const ROLE=params.get('role')||window.SAMPARK_ROLE||'Software Engineer';

document.getElementById('widgetTitle').textContent=CLIENT_NAME+' — AI Screener';
document.getElementById('widgetSub').textContent='Applying for: '+ROLE;

const FLOW=[
  {bot:`Hi there! 👋 I'm the AI screener for <strong>${CLIENT_NAME}</strong>.\n\nI'll ask you a few quick questions for the <strong>${ROLE}</strong> role. It takes just 3–4 minutes!\n\nReady to start?`,opts:['Yes, let\'s go! 🚀','Tell me more first']},
  {bot:'Great! First, what\'s your full name?',field:'name',ph:'Your full name'},
  {bot:'Nice to meet you, {name}! What\'s your mobile number?',field:'phone',ph:'10-digit mobile number'},
  {bot:'What\'s your email address?',field:'email',ph:'your@email.com'},
  {bot:'How many years of work experience do you have?',field:'experience',opts:['Fresher (0–1 yr)','1–3 years','3–5 years','5–10 years','10+ years']},
  {bot:'What\'s your current job title?',field:'current_role',ph:'e.g. Business Development Manager'},
  {bot:'What\'s your notice period?',field:'notice_period',opts:['Immediately available','15 days','1 month','2 months','3 months']},
  {bot:'What\'s your current CTC (annual package)?',field:'current_ctc',opts:['Under 3 LPA','3–6 LPA','6–12 LPA','12–20 LPA','20–35 LPA','35+ LPA']},
  {bot:'What\'s your expected CTC?',field:'expected_ctc',opts:['3–6 LPA','6–12 LPA','12–20 LPA','20–35 LPA','35–50 LPA','50+ LPA']},
  {bot:'Are you open to relocating or working from office?',field:'location_pref',opts:['Yes, open to relocation','Prefer remote work','Hybrid is fine','Only within current city']},
  {bot:'Tell me about your key skills and why you\'re a great fit for this role:',field:'skills',ph:'e.g. 5 years in B2B sales, led team of 8, CRM expertise…'},
  {bot:null}
];

let step=0,answers={},done=false;

function addMsg(html,role='bot'){
  const body=document.getElementById('chatBody');
  const d=document.createElement('div');
  d.className='msg '+role;
  const now=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  d.innerHTML=`<div class="bubble">${html.replace(/\n/g,'<br>')}</div><div class="msg-time">${now}</div>`;
  body.appendChild(d);
  body.scrollTop=body.scrollHeight;
}

function showTyping(){
  const body=document.getElementById('chatBody');
  const d=document.createElement('div');
  d.className='msg bot';d.id='typing';
  d.innerHTML='<div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div>';
  body.appendChild(d);
  body.scrollTop=body.scrollHeight;
}
function removeTyping(){const t=document.getElementById('typing');if(t)t.remove();}

function setOpts(opts){
  const o=document.getElementById('chatOptions');
  if(!opts||!opts.length){o.innerHTML='';return;}
  o.innerHTML=opts.map(op=>`<button class="opt" onclick="selectOpt('${op.replace(/'/g,'&#39;')}')">${op}</button>`).join('');
}

function setProgress(n){document.getElementById('progressFill').style.width=Math.round(n/(FLOW.length-1)*100)+'%';}

function interpolate(t){return t.replace(/\{(\w+)\}/g,(_,k)=>answers[k]||'');}

function selectOpt(val){
  if(done)return;
  addMsg(val,'user');
  setOpts([]);
  if(step===0){
    if(val.includes('Tell me more')){
      setTimeout(()=>{addMsg('Sampark AI uses conversational AI to screen candidates — no lengthy forms, no waiting. Your answers are analysed and scored, and only top candidates are passed to the hiring team. Ready?');setOpts(['Yes, start now!']);},600);
      return;
    }
    nextStep();return;
  }
  const s=FLOW[step];
  if(s.field)answers[s.field]=val;
  nextStep();
}

function sendMsg(){
  if(done)return;
  const inp=document.getElementById('chatInput');
  const val=inp.value.trim();
  if(!val)return;
  addMsg(val,'user');
  inp.value='';
  setOpts([]);
  if(step===0){nextStep();return;}
  const s=FLOW[step];
  if(s.field)answers[s.field]=val;
  nextStep();
}
function handleKey(e){if(e.key==='Enter')sendMsg();}

async function nextStep(){
  step++;
  setProgress(step);
  if(step>=FLOW.length-1){await finish();return;}
  const s=FLOW[step];
  showTyping();
  setTimeout(()=>{
    removeTyping();
    addMsg(interpolate(s.bot));
    if(s.opts)setOpts(s.opts);
    else setOpts([]);
    document.getElementById('chatInput').placeholder=s.ph||'Type your answer…';
  },700);
}

function computeScore(){
  const expMap={'Fresher (0–1 yr)':1,'1–3 years':2,'3–5 years':3,'5–10 years':4,'10+ years':5};
  const e=expMap[answers.experience]||2;
  let s=3+e;
  if(answers.skills&&answers.skills.length>60)s+=1;
  if(answers.email&&answers.email.includes('@'))s+=0.5;
  if(answers.phone&&answers.phone.length>=10)s+=0.5;
  return Math.min(10,Math.round(s*10)/10);
}

async function finish(){
  done=true;
  setOpts([]);
  document.getElementById('chatInput').disabled=true;
  document.querySelector('.send').disabled=true;
  const score=computeScore();
  showTyping();
  await new Promise(r=>setTimeout(r,1000));
  removeTyping();
  addMsg(`Thank you, <strong>${answers.name||'there'}</strong>! 🎉\n\nScreening complete. Here's your summary:\n\n📋 <strong>Role:</strong> ${ROLE}\n⭐ <strong>AI Score:</strong> ${score}/10\n⏱ <strong>Notice:</strong> ${answers.notice_period||'–'}\n💰 <strong>Expected CTC:</strong> ${answers.expected_ctc||'–'}\n\n<strong>${CLIENT_NAME}</strong>'s HR team will review your profile and reach out within 2 hours if you're shortlisted. Good luck!`);

  const summary=`${answers.name} applied for ${ROLE} at ${CLIENT_NAME}. Experience: ${answers.experience||'–'}. Current: ${answers.current_role||'–'}. Skills: ${answers.skills||'–'}. Notice: ${answers.notice_period||'–'}. Expected CTC: ${answers.expected_ctc||'–'}. Score: ${score}/10.`;

  const {error}=await sb.from('candidates').insert([{
    name:answers.name||'Unknown',
    phone:answers.phone||'',
    email:answers.email||'',
    role:ROLE,
    experience:answers.experience||'',
    current_role:answers.current_role||'',
    notice_period:answers.notice_period||'',
    current_ctc:answers.current_ctc||'',
    expected_ctc:answers.expected_ctc||'',
    location_pref:answers.location_pref||'',
    skills:answers.skills||'',
    score:score,
    status:'pending',
    client_name:CLIENT_NAME,
    job_id:JOB_ID?parseInt(JOB_ID):null,
    summary:summary
  }]);

  if(error){console.error('Save error:',error);}
  else{document.getElementById('successBanner').style.display='block';}
  setProgress(FLOW.length-1);
}

window.addEventListener('DOMContentLoaded',()=>{
  showTyping();
  setTimeout(()=>{removeTyping();addMsg(FLOW[0].bot);setOpts(FLOW[0].opts);},800);
});
</script>
</body>
</html>
