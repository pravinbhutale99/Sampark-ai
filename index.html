<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sampark AI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:#0a0a0f;color:#e8e8f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px}
  .dot{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#6c63ff,#ff6584);display:inline-block;margin-bottom:20px}
  h1{font-size:40px;font-weight:800;letter-spacing:-1.5px;margin-bottom:16px}
  h1 span{background:linear-gradient(135deg,#6c63ff,#ff6584);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  p{color:#6b6b80;font-size:15px;max-width:480px;line-height:1.6;margin-bottom:36px}
  .btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  a{padding:12px 28px;border-radius:10px;font-weight:700;text-decoration:none;font-size:14px}
  .a{background:linear-gradient(135deg,#6c63ff,#8b5cf6);color:#fff}
  .b{background:rgba(108,99,255,0.1);color:#6c63ff;border:1.5px solid rgba(108,99,255,0.3)}
</style>
</head>
<body>
  <div class="dot"></div>
  <h1>Screen candidates<br/><span>2x faster</span> with AI</h1>
  <p>Sampark AI screens candidates via conversational AI, scores them, and delivers a shortlist to your clients within 2 hours.</p>
  <div class="btns">
    <a href="/admin.html" class="a">Admin Dashboard</a>
    <a href="/client.html" class="b">Client Portal</a>
    <a href="/chatbot.html" class="b">Try Chatbot</a>
  </div>
</body>
</html>
