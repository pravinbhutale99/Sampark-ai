<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shortlist Report – Sampark AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
<style>
:root {
  --ink: #0a0a0f;
  --paper: #f5f3ee;
  --accent: #e85a2a;
  --accent2: #f59e0b;
  --muted: #7a7870;
  --card: #ffffff;
  --border: #e2dfd8;
  --green: #15803d;
  --green-bg: #dcfce7;
  --yellow: #92400e;
  --yellow-bg: #fef9c3;
  --red: #991b1b;
  --red-bg: #fee2e2;
  --blue: #1d4ed8;
  --blue-bg: #dbeafe;
  --purple: #6d28d9;
  --purple-bg: #ede9fe;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--paper); font-family: 'DM Sans', sans-serif; color: var(--ink); min-height: 100vh; }

/* ── HEADER ── */
.report-header { background: var(--ink); padding: 2.5rem 3rem; display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 1.5rem; }
.logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; color: #fff; margin-bottom: 0.4rem; }
.logo span { color: var(--accent); }
.report-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2rem; color: #fff; line-height: 1.15; margin-top: 1rem; }
.report-meta { display: flex; gap: 1.5rem; margin-top: 0.75rem; flex-wrap: wrap; }
.report-meta span { font-size: 0.82rem; color: rgba(255,255,255,0.5); display: flex; align-items: center; gap: 0.35rem; }
.header-stats { display: flex; gap: 1rem; flex-wrap: wrap; }
.hstat { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 1rem 1.4rem; text-align: center; min-width: 80px; }
.hstat .hval { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.8rem; color: #fff; line-height: 1; }
.hstat .hlbl { font-size: 0.68rem; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.07em; margin-top: 0.3rem; }

/* ── CONTROLS ── */
.controls { padding: 1.25rem 3rem; display: flex; align-items: center; gap: 0.6rem; background: #fff; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.filter-pill { padding: 0.38rem 0.95rem; border-radius: 100px; border: 1.5px solid var(--border); background: transparent; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; cursor: pointer; transition: all 0.2s; color: var(--muted); }
.filter-pill:hover { border-color: var(--ink); color: var(--ink); }
.filter-pill.active { background: var(--ink); color: #fff; border-color: var(--ink); }
.filter-pill.f-shortlisted.active { background: var(--green); border-color: var(--green); }
.filter-pill.f-scheduled.active { background: var(--purple); border-color: var(--purple); }
.filter-pill.f-rejected.active { background: var(--red); border-color: var(--red); }
.filter-pill.f-pending.active { background: #b45309; border-color: #b45309; }
.sort-select { margin-left: auto; padding: 0.38rem 0.8rem; border: 1.5px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; background: #fff; color: var(--ink); cursor: pointer; outline: none; }

/* ── GRID ── */
.candidates-grid { padding: 2rem 3rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 1.25rem; }

/* ── CARD ── */
.cand-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 16px; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; position: relative; animation: fadeUp 0.4s ease both; }
.cand-card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.1); }
.cand-card.shortlisted { border-color: #bbf7d0; }
.cand-card.shortlisted::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background: linear-gradient(90deg, var(--green), #34d399); }
.cand-card.top-pick { border-color: var(--accent); }
.cand-card.top-pick::before { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
.cand-card.scheduled { border-color: #c4b5fd; }
.cand-card.scheduled::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background: linear-gradient(90deg, var(--purple), #a78bfa); }
.cand-card.rejected { border-color: #fecaca; opacity: 0.72; }
.cand-card.rejected::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background: var(--red); }

.cand-card:nth-child(1){animation-delay:.05s} .cand-card:nth-child(2){animation-delay:.1s} .cand-card:nth-child(3){animation-delay:.15s} .cand-card:nth-child(4){animation-delay:.2s} .cand-card:nth-child(5){animation-delay:.25s} .cand-card:nth-child(6){animation-delay:.3s}
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

.card-top { padding: 1.25rem 1.4rem 1rem; display: flex; align-items: flex-start; gap: 1rem; }
.avatar { width: 48px; height: 48px; border-radius: 12px; background: var(--ink); color: #fff; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; flex-shrink: 0; }
.avatar.green{background:#14532d} .avatar.blue{background:#1e3a8a} .avatar.purple{background:#4c1d95} .avatar.rose{background:#881337} .avatar.teal{background:#134e4a}
.card-name-block { flex: 1; min-width: 0; }
.cand-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.05rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cand-role { font-size: 0.8rem; color: var(--muted); margin-top: 0.2rem; }
.card-badges { display: flex; flex-direction: column; align-items: flex-end; gap: 0.4rem; flex-shrink: 0; }
.status-badge { display: inline-flex; padding: 0.2rem 0.65rem; border-radius: 100px; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.02em; white-space: nowrap; }
.status-badge.shortlisted{background:var(--green-bg);color:var(--green)}
.status-badge.pending{background:var(--yellow-bg);color:var(--yellow)}
.status-badge.scheduled{background:var(--purple-bg);color:var(--purple)}
.status-badge.rejected{background:var(--red-bg);color:var(--red)}
.status-badge.top{background:#fef3c7;color:#92400e}

.score-ring { display: flex; flex-direction: column; align-items: center; }
.score-num { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem; line-height: 1; }
.score-num.high{color:var(--green)} .score-num.mid{color:#b45309} .score-num.low{color:var(--red)}
.score-label { font-size: 0.62rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 0.15rem; }

.stars { display: flex; gap: 2px; margin-top: 0.5rem; }
.star { font-size: 0.95rem; line-height: 1; }
.star.full{color:var(--accent)} .star.half{color:var(--accent);opacity:0.5} .star.empty{color:var(--border)}

.quick-facts { display: flex; gap: 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.qf { flex: 1; padding: 0.7rem 1rem; border-right: 1px solid var(--border); text-align: center; }
.qf:last-child{border-right:none}
.qf-val { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.88rem; }
.qf-lbl { font-size: 0.67rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 0.1rem; }

.score-bars { padding: 1rem 1.4rem; }
.bar-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.55rem; }
.bar-row:last-child{margin-bottom:0}
.bar-name { font-size: 0.76rem; color: var(--muted); width: 90px; flex-shrink: 0; }
.bar-track { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
.bar-fill.green { background: linear-gradient(90deg, #16a34a, #34d399); }
.bar-pct { font-size: 0.72rem; font-weight: 600; color: var(--ink); width: 26px; text-align: right; flex-shrink: 0; }

.summary-strip { padding: 0.9rem 1.4rem; background: #fafaf8; border-top: 1px solid var(--border); font-size: 0.8rem; color: var(--muted); line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

.tag-row { padding: 0.75rem 1.4rem; display: flex; flex-wrap: wrap; gap: 0.35rem; border-top: 1px solid var(--border); }
.tag { padding: 0.18rem 0.55rem; border-radius: 4px; font-size: 0.71rem; font-weight: 500; }
.tag.green{background:var(--green-bg);color:var(--green)} .tag.red{background:var(--red-bg);color:var(--red)}

/* ── CARD FOOTER ACTIONS ── */
.card-footer { padding: 0.85rem 1.4rem; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); gap: 0.5rem; flex-wrap: wrap; }
.contact-info { font-size: 0.75rem; color: var(--muted); display: flex; flex-direction: column; gap: 0.15rem; }
.action-btns { display: flex; gap: 0.4rem; flex-wrap: wrap; }

.btn { padding: 0.38rem 0.8rem; border-radius: 7px; border: none; cursor: pointer; font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.73rem; transition: all 0.2s; white-space: nowrap; display: inline-flex; align-items: center; gap: 0.3rem; }
.btn-confirm{background:var(--green-bg);color:var(--green)} .btn-confirm:hover{background:var(--green);color:#fff}
.btn-reject{background:var(--red-bg);color:var(--red)} .btn-reject:hover{background:var(--red);color:#fff}
.btn-schedule{background:var(--purple-bg);color:var(--purple)} .btn-schedule:hover{background:var(--purple);color:#fff}
.btn-dark{background:var(--ink);color:#fff} .btn-dark:hover{background:var(--accent)}
.btn-lg { padding: 0.6rem 1rem; font-size: 0.8rem; flex: 1; justify-content: center; }

/* ── SCHEDULE CALL MODAL ── */
.sched-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.55); backdrop-filter:blur(6px); z-index:2000; display:flex; align-items:center; justify-content:center; padding:1.5rem; opacity:0; pointer-events:none; transition:opacity 0.25s; }
.sched-modal-overlay.open { opacity:1; pointer-events:all; }
.sched-modal { background:#fff; border-radius:20px; width:100%; max-width:440px; overflow:hidden; transform:translateY(16px) scale(0.98); transition:transform 0.25s; }
.sched-modal-overlay.open .sched-modal { transform:translateY(0) scale(1); }
.sched-header { background: linear-gradient(135deg, var(--purple), #7c3aed); padding:1.5rem 1.75rem; }
.sched-header h3 { font-family:'Syne',sans-serif; font-weight:800; font-size:1.2rem; color:#fff; }
.sched-header p { font-size:0.82rem; color:rgba(255,255,255,0.6); margin-top:0.25rem; }
.sched-body { padding:1.5rem 1.75rem; }
.form-group { margin-bottom:1rem; }
.form-group label { display:block; font-size:0.8rem; font-weight:500; color:var(--muted); margin-bottom:0.35rem; text-transform:uppercase; letter-spacing:0.05em; }
.form-group input, .form-group select, .form-group textarea { width:100%; padding:0.65rem 0.9rem; border:1.5px solid var(--border); border-radius:9px; font-family:'DM Sans',sans-serif; font-size:0.88rem; outline:none; transition:border-color 0.2s; background:#fff; resize:vertical; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:var(--purple); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:0.75rem; }
.sched-footer { padding:1rem 1.75rem 1.5rem; display:flex; gap:0.75rem; }
.btn-purple { background:var(--purple); color:#fff; }
.btn-purple:hover { background:#5b21b6; }
.btn-outline { background:transparent; color:var(--muted); border:1.5px solid var(--border); }
.btn-outline:hover { border-color:var(--ink); color:var(--ink); }

/* ── SCHEDULED CALL BADGE ON CARD ── */
.scheduled-info { padding:0.65rem 1.4rem; background:var(--purple-bg); border-top:1px solid #c4b5fd; font-size:0.78rem; color:var(--purple); display:flex; align-items:center; gap:0.5rem; }

/* ── MAIN MODAL ── */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.55); backdrop-filter:blur(6px); z-index:1000; display:flex; align-items:center; justify-content:center; padding:1.5rem; opacity:0; pointer-events:none; transition:opacity 0.25s; }
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal { background:#fff; border-radius:20px; width:100%; max-width:560px; max-height:88vh; overflow-y:auto; transform:translateY(16px) scale(0.98); transition:transform 0.25s; position:relative; }
.modal-overlay.open .modal { transform:translateY(0) scale(1); }
.modal-header { background:var(--ink); padding:1.75rem 2rem; border-radius:20px 20px 0 0; }
.modal-avatar { width:52px; height:52px; border-radius:12px; background:rgba(255,255,255,0.15); color:#fff; display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; font-weight:700; font-size:1.1rem; margin-bottom:1rem; }
.modal-name { font-family:'Syne',sans-serif; font-weight:800; font-size:1.4rem; color:#fff; }
.modal-role { font-size:0.83rem; color:rgba(255,255,255,0.5); margin-top:0.25rem; }
.modal-score-row { display:flex; align-items:center; gap:1rem; margin-top:1rem; flex-wrap:wrap; }
.modal-score-big { font-family:'Syne',sans-serif; font-weight:800; font-size:2.8rem; color:#fff; line-height:1; }
.modal-score-sub { font-size:0.72rem; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:0.06em; }
.modal-body { padding:1.75rem 2rem; }
.modal-section { margin-bottom:1.5rem; }
.modal-section h4 { font-size:0.72rem; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:0.6rem; }
.modal-section p { font-size:0.88rem; line-height:1.65; color:var(--ink); }
.modal-tags { display:flex; flex-wrap:wrap; gap:0.4rem; }
.qa-block { margin-bottom:1rem; padding:0.9rem 1rem; background:#fafaf8; border-radius:10px; border-left:3px solid var(--accent); }
.qa-q { font-size:0.76rem; font-weight:600; color:var(--muted); margin-bottom:0.3rem; }
.qa-a { font-size:0.85rem; line-height:1.6; color:var(--ink); }
.modal-bar-row { display:flex; align-items:center; gap:0.75rem; margin-bottom:0.65rem; }
.modal-bar-name { font-size:0.83rem; width:110px; flex-shrink:0; }
.modal-bar-track { flex:1; height:7px; background:var(--border); border-radius:4px; overflow:hidden; }
.modal-bar-fill { height:100%; border-radius:4px; background:linear-gradient(90deg,var(--accent),var(--accent2)); }
.modal-bar-pct { font-family:'Syne',sans-serif; font-weight:700; font-size:0.8rem; width:30px; text-align:right; }
.modal-footer { padding:1.25rem 2rem; border-top:1px solid var(--border); display:flex; gap:0.75rem; flex-wrap:wrap; }
.close-btn { position:absolute; top:1rem; right:1rem; width:32px; height:32px; border-radius:50%; background:rgba(255,255,255,0.1); color:#fff; border:none; cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center; }

/* ── EMPTY ── */
.empty { grid-column:1/-1; text-align:center; padding:4rem 2rem; color:var(--muted); }
.empty-icon { font-size:3rem; margin-bottom:0.75rem; }

/* ── FOOTER ── */
.report-footer { padding:2rem 3rem; text-align:center; border-top:1px solid var(--border); color:var(--muted); font-size:0.78rem; margin-top:1rem; }
.report-footer strong { color:var(--accent); }

/* ── TOAST ── */
.toast { position:fixed; bottom:2rem; right:2rem; background:var(--ink); color:#fff; padding:0.8rem 1.25rem; border-radius:10px; font-size:0.85rem; z-index:9999; transform:translateY(80px); opacity:0; transition:all 0.3s; pointer-events:none; }
.toast.show { transform:translateY(0); opacity:1; }

@media(max-width:900px){
  .report-header{padding:1.75rem 1.5rem} .candidates-grid{padding:1.5rem;grid-template-columns:1fr} .controls{padding:1rem 1.5rem}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="report-header">
  <div class="header-left">
    <div class="logo">Sampark<span>AI</span></div>
    <div class="report-title">Senior Sales Executive<br/>Shortlist Report</div>
    <div class="report-meta">
      <span>🏢 TechCorp India</span>
      <span>📅 <span id="report-date"></span></span>
      <span>⚡ AI-Screened in &lt; 2 hours</span>
    </div>
  </div>
  <div class="header-stats">
    <div class="hstat"><div class="hval" id="stat-applied">5</div><div class="hlbl">Applied</div></div>
    <div class="hstat"><div class="hval" id="stat-shortlisted">0</div><div class="hlbl">Shortlisted</div></div>
    <div class="hstat"><div class="hval" id="stat-scheduled">0</div><div class="hlbl">Scheduled</div></div>
    <div class="hstat"><div class="hval" id="stat-rejected">0</div><div class="hlbl">Rejected</div></div>
  </div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <button class="filter-pill active" onclick="setFilter('all',this)">All Candidates</button>
  <button class="filter-pill f-shortlisted" onclick="setFilter('shortlisted',this)">✓ Shortlisted</button>
  <button class="filter-pill f-scheduled" onclick="setFilter('scheduled',this)">📞 Call Scheduled</button>
  <button class="filter-pill f-rejected" onclick="setFilter('rejected',this)">✗ Rejected</button>
  <button class="filter-pill f-pending" onclick="setFilter('pending',this)">⏳ Pending</button>
  <select class="sort-select" onchange="setSort(this.value)">
    <option value="score">Sort: Highest Score</option>
    <option value="name">Sort: Name A–Z</option>
    <option value="salary">Sort: Lowest Salary</option>
  </select>
</div>

<!-- GRID -->
<div class="candidates-grid" id="candidates-grid"></div>

<!-- FOOTER -->
<div class="report-footer">Generated by <strong>Sampark AI</strong> · AI-powered recruiting for Indian agencies · samparkai.tech</div>

<!-- ── SCHEDULE CALL MODAL ── -->
<div class="sched-modal-overlay" id="sched-modal" onclick="if(event.target===this)closeSchedModal()">
  <div class="sched-modal">
    <div class="sched-header">
      <h3>📞 Schedule a Call</h3>
      <p id="sched-cand-name">Candidate Name</p>
    </div>
    <div class="sched-body">
      <div class="form-row">
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="sched-date"/>
        </div>
        <div class="form-group">
          <label>Time</label>
          <input type="time" id="sched-time"/>
        </div>
      </div>
      <div class="form-group">
        <label>Call Type</label>
        <select id="sched-type">
          <option value="Phone Call">📱 Phone Call</option>
          <option value="Google Meet">🎥 Google Meet</option>
          <option value="Zoom">💻 Zoom</option>
          <option value="WhatsApp Call">💬 WhatsApp Call</option>
          <option value="In-Person">🏢 In-Person</option>
        </select>
      </div>
      <div class="form-group">
        <label>Notes (optional)</label>
        <textarea id="sched-notes" rows="2" placeholder="e.g. Focus on leadership questions, salary negotiation..."></textarea>
      </div>
    </div>
    <div class="sched-footer">
      <button class="btn btn-purple btn-lg" onclick="confirmSchedule()">✓ Confirm Schedule</button>
      <button class="btn btn-outline btn-lg" onclick="closeSchedModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- ── MAIN PROFILE MODAL ── -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-inner">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── DATA ──
const CANDIDATES = [

    summary:'Strong B2B sales background with consistent quota achievement. Handled enterprise accounts at previous firm. High energy and structured approach to pipelines.',

let currentFilter = 'all';
let currentSort = 'score';
let schedCandId = null;

// ── HELPERS ──
function scoreClass(s){ return s>=80?'high':s>=60?'mid':'low'; }
function starsHtml(score){
  const r = score/20;
  let h='';
  for(let i=1;i<=5;i++){
    if(r>=i) h+='<span class="star full">★</span>';
    else if(r>=i-0.5) h+='<span class="star half">★</span>';
    else h+='<span class="star empty">★</span>';
  }
  return h;
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ── RENDER ──
function render(){
  let list=[...CANDIDATES];
  if(currentFilter==='shortlisted') list=list.filter(c=>c.status==='shortlisted');
  if(currentFilter==='scheduled') list=list.filter(c=>c.status==='scheduled');
  if(currentFilter==='rejected') list=list.filter(c=>c.status==='rejected');
  if(currentFilter==='pending') list=list.filter(c=>c.status==='pending');
  if(currentSort==='score') list.sort((a,b)=>b.score-a.score);
  if(currentSort==='name') list.sort((a,b)=>a.name.localeCompare(b.name));
  if(currentSort==='salary') list.sort((a,b)=>parseInt(a.salary)-parseInt(b.salary));

  const grid=document.getElementById('candidates-grid');
  if(!list.length){
    grid.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><p>No candidates in this filter</p></div>';
    return;
  }

  grid.innerHTML=list.map((c,idx)=>{
    const isTop = idx===0 && currentFilter!=='rejected' && currentFilter!=='pending';
    const cardClass = c.status==='scheduled'?'scheduled':c.status==='rejected'?'rejected':c.status==='shortlisted'?'shortlisted':'';
    const topClass = isTop?'top-pick':'';
    const topSkills = c.skills.slice(0,3);

    const statusLabel = {shortlisted:'✓ Shortlisted', scheduled:'📞 Call Scheduled', rejected:'✗ Rejected', pending:'⏳ Pending'}[c.status]||'⏳ Pending';

    const schedInfo = c.callScheduled ? `
      <div class="scheduled-info">
        📞 ${c.callScheduled.type} scheduled · ${c.callScheduled.date} at ${c.callScheduled.time}
        ${c.callScheduled.notes?` · <em>${c.callScheduled.notes}</em>`:''}
      </div>` : '';

    return `
    <div class="cand-card ${cardClass} ${topClass}" onclick="openModal('${c.id}')">
      <div class="card-top">
        <div class="avatar ${c.avatarColor}">${c.initials}</div>
        <div class="card-name-block">
          <div class="cand-name">${c.name}</div>
          <div class="cand-role">${c.role}</div>
          <div class="stars">${starsHtml(c.score)}</div>
        </div>
        <div class="card-badges">
          ${isTop?'<span class="status-badge top">🏆 Top Pick</span>':''}
          <span class="status-badge ${c.status}">${statusLabel}</span>
          <div class="score-ring" style="margin-top:0.3rem">
            <div class="score-num ${scoreClass(c.score)}">${c.score}</div>
            <div class="score-label">/ 100</div>
          </div>
        </div>
      </div>

      <div class="quick-facts">
        <div class="qf"><div class="qf-val">${c.experience}</div><div class="qf-lbl">Experience</div></div>
        <div class="qf"><div class="qf-val">${c.salary}</div><div class="qf-lbl">Expected CTC</div></div>
        <div class="qf"><div class="qf-val">${c.score>=80?'Strong':c.score>=65?'Good':'Weak'}</div><div class="qf-lbl">AI Rating</div></div>
      </div>

      <div class="score-bars">
        ${topSkills.map(s=>`
          <div class="bar-row">
            <div class="bar-name">${s.name}</div>
            <div class="bar-track"><div class="bar-fill ${s.score>=80?'green':''}" style="width:${s.score}%"></div></div>
            <div class="bar-pct">${s.score}</div>
          </div>`).join('')}
      </div>

      <div class="summary-strip">${c.summary}</div>

      <div class="tag-row">
        ${c.strengths.slice(0,2).map(s=>`<span class="tag green">✓ ${s}</span>`).join('')}
        ${c.watchpoints.slice(0,1).map(w=>`<span class="tag red">⚠ ${w}</span>`).join('')}
      </div>

      ${schedInfo}

      <div class="card-footer">
        <div class="contact-info">
          <span>📱 ${c.phone}</span>
          <span>✉ ${c.email}</span>
        </div>
        <div class="action-btns" onclick="event.stopPropagation()">
          <button class="btn btn-confirm" title="Shortlist" onclick="setStatus('${c.id}','shortlisted')">✓</button>
          <button class="btn btn-schedule" title="Schedule Call" onclick="openSchedModal('${c.id}')">📞</button>
          <button class="btn btn-reject" title="Reject" onclick="setStatus('${c.id}','rejected')">✗</button>
          <button class="btn btn-dark" onclick="openModal('${c.id}')">Profile →</button>
        </div>
      </div>
    </div>`;
  }).join('');

  updateStats();
}

function updateStats(){
  document.getElementById('stat-applied').textContent = CANDIDATES.length;
  document.getElementById('stat-shortlisted').textContent = CANDIDATES.filter(c=>c.status==='shortlisted').length;
  document.getElementById('stat-scheduled').textContent = CANDIDATES.filter(c=>c.status==='scheduled').length;
  document.getElementById('stat-rejected').textContent = CANDIDATES.filter(c=>c.status==='rejected').length;
}

// ── FILTER / SORT ──
function setFilter(f,el){
  currentFilter=f;
  document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  render();
}
function setSort(v){ currentSort=v; render(); }

// ── STATUS ──
function setStatus(id,status){
  const c=CANDIDATES.find(x=>x.id===id);
  if(!c) return;
  c.status=status;
  if(status!=='scheduled') c.callScheduled=null;
  const labels={shortlisted:'✓ Shortlisted',rejected:'✗ Rejected'};
  showToast(`${c.name} → ${labels[status]||status}`);
  render();
}

// ── SCHEDULE MODAL ──
function openSchedModal(id){
  schedCandId=id;
  const c=CANDIDATES.find(x=>x.id===id);
  document.getElementById('sched-cand-name').textContent=c.name+' · '+c.role;
  // prefill today + 1 day
  const d=new Date(); d.setDate(d.getDate()+1);
  document.getElementById('sched-date').value=d.toISOString().split('T')[0];
  document.getElementById('sched-time').value='10:00';
  document.getElementById('sched-notes').value='';
  document.getElementById('sched-modal').classList.add('open');
}
function closeSchedModal(){ document.getElementById('sched-modal').classList.remove('open'); schedCandId=null; }

function confirmSchedule(){
  if(!schedCandId) return;
  const c=CANDIDATES.find(x=>x.id===schedCandId);
  const date=document.getElementById('sched-date').value;
  const time=document.getElementById('sched-time').value;
  const type=document.getElementById('sched-type').value;
  const notes=document.getElementById('sched-notes').value.trim();
  if(!date||!time){ showToast('Please pick a date and time'); return; }
  // Format date nicely
  const dateStr=new Date(date).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
  const timeStr=new Date('2000-01-01T'+time).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  c.status='scheduled';
  c.callScheduled={date:dateStr,time:timeStr,type,notes};
  closeSchedModal();
  showToast(`📞 Call scheduled with ${c.name} on ${dateStr} at ${timeStr}`);
  render();
}

// ── PROFILE MODAL ──
function openModal(id){
  const c=CANDIDATES.find(x=>x.id===id);
  if(!c) return;
  const statusLabel={shortlisted:'✓ Shortlisted',scheduled:'📞 Call Scheduled',rejected:'✗ Rejected',pending:'⏳ Pending'}[c.status]||'⏳ Pending';

  document.getElementById('modal-content').innerHTML=`
    <div class="modal-header">
      <div class="modal-avatar">${c.initials}</div>
      <div class="modal-name">${c.name}</div>
      <div class="modal-role">${c.role} · ${c.experience}</div>
      <div class="modal-score-row">
        <div><div class="modal-score-big">${c.score}</div><div class="modal-score-sub">AI Score / 100</div></div>
        <div>
          <div class="stars" style="font-size:1.3rem">${starsHtml(c.score)}</div>
          <div style="font-size:0.75rem;color:rgba(255,255,255,0.4);margin-top:0.3rem">Expected: ${c.salary} · ${c.experience}</div>
        </div>
        <span class="status-badge ${c.status}" style="margin-left:auto">${statusLabel}</span>
      </div>
      ${c.callScheduled?`<div style="margin-top:0.75rem;font-size:0.8rem;color:rgba(255,255,255,0.5)">📞 ${c.callScheduled.type} · ${c.callScheduled.date} at ${c.callScheduled.time}</div>`:''}
    </div>

    <div class="modal-body">
      <div class="modal-section"><h4>AI Summary</h4><p>${c.summary}</p></div>
      <div class="modal-section">
        <h4>Strengths</h4>
        <div class="modal-tags">${c.strengths.map(s=>`<span class="tag green">✓ ${s}</span>`).join('')}</div>
      </div>
      <div class="modal-section">
        <h4>Watch Points</h4>
        <div class="modal-tags">${c.watchpoints.map(w=>`<span class="tag red">⚠ ${w}</span>`).join('')}</div>
      </div>
      <div class="modal-section">
        <h4>Screening Answers</h4>
        ${c.answers.map(a=>`<div class="qa-block"><div class="qa-q">Q: ${a.q}</div><div class="qa-a">${a.a}</div></div>`).join('')}
      </div>
      <div class="modal-section">
        <h4>Skill Breakdown</h4>
        ${c.skills.map(s=>`
          <div class="modal-bar-row">
            <div class="modal-bar-name">${s.name}</div>
            <div class="modal-bar-track"><div class="modal-bar-fill" style="width:${s.score}%"></div></div>
            <div class="modal-bar-pct">${s.score}</div>
          </div>`).join('')}
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-confirm btn-lg" onclick="setStatus('${c.id}','shortlisted');closeModal()">✓ Shortlist</button>
      <button class="btn btn-schedule btn-lg" onclick="closeModal();openSchedModal('${c.id}')">📞 Schedule Call</button>
      <button class="btn btn-reject btn-lg" onclick="setStatus('${c.id}','rejected');closeModal()">✗ Reject</button>
    </div>`;

  document.getElementById('modal').classList.add('open');
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); }
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){closeModal();closeSchedModal();} });

// ── INIT ──
document.getElementById('report-date').textContent=new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
render();
</script>
</body>
